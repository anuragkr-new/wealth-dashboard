services:
  postgres:
    image: postgres:16-alpine
    container_name: wealth-dashboard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wealth
    volumes:
      - wealth_pgdata:/var/lib/postgresql/data

volumes:
  wealth_pgdata:
